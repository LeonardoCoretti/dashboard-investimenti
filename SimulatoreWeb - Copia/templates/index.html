<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Investimenti Generali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        .hidden { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* Nasconde le freccette (spinners) dagli input numerici per un look più pulito */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield; /* Per le vecchie versioni di Firefox */
            appearance: textfield;      /* Aggiunta dello standard moderno richiesto dai linter */
        }
    </style>
</head>
<body class="bg-[#F4F7FE] text-gray-800 font-sans p-4 md:p-8 min-h-screen flex flex-col">

    <div class="max-w-7xl mx-auto space-y-6 flex-grow w-full">
        
        <header class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h1 class="text-3xl font-bold text-[#C8102E]">DASHBOARD RENDIMENTI ATTESI</h1>
            <p class="text-gray-500 mt-2">Analisi e comparazione dell'investimento.</p>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6 items-start">
            
            <div class="col-span-1 bg-white p-6 rounded-xl shadow-sm border border-gray-200 xl:sticky xl:top-6 xl:max-h-[calc(100vh-3rem)] overflow-y-auto custom-scrollbar">
                
                <h3 class="text-xl font-semibold mb-4 text-[#212529]">Parametri Base</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Capitale (€)</label>
                        <input type="number" id="inputCapitale" value="10000" class="mt-1 w-full rounded-md border-gray-300 shadow-sm p-2 border focus:border-[#C8102E] transition-colors">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Durata (Anni)</label>
                        <input type="number" id="inputAnni" value="10" class="mt-1 w-full rounded-md border-gray-300 shadow-sm p-2 border focus:border-[#C8102E] transition-colors">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Scenario di Mercato</label>
                        <select id="inputTassi" onchange="aggiornaCampiTassi()" class="mt-1 w-full rounded-md border-gray-300 shadow-sm p-2 border focus:border-[#C8102E] transition-colors">
                            <option value="f">Tassi Fissi (Personalizzabili)</option>
                            <option value="v">Tassi Stocastici (Simulati)</option>
                        </select>
                    </div>

                    <div id="config_TassiFissi" class="p-3 bg-red-50 rounded-md border border-red-100 text-sm space-y-2 mt-2 transition-all">
                        <label class="block font-medium text-[#C8102E] mb-2">IMPOSTA RENDIMENTI LORDI:</label>
                        <div class="grid grid-cols-3 gap-2">
                            <div><label class="text-xs text-gray-600">Gesav (%)</label><input type="number" id="tassi_gs" step="0.1" value="3.5" class="w-full p-1 border rounded"></div>
                            <div><label class="text-xs text-gray-600">Fondi (%)</label><input type="number" id="tassi_fi" step="0.1" value="5.0" class="w-full p-1 border rounded"></div>
                            <div><label class="text-xs text-gray-600">OICR (%)</label><input type="number" id="tassi_oicr" step="0.1" value="4.0" class="w-full p-1 border rounded"></div>
                        </div>
                        <input type="hidden" id="tassi_inf" value="0">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mt-4">Motivo Uscita</label>
                        <select id="inputUscita" class="mt-1 w-full rounded-md border-gray-300 shadow-sm p-2 border focus:border-[#C8102E] transition-colors">
                            <option value="r">Riscatto</option>
                            <option value="d">Decesso</option>
                        </select>
                    </div>

                    <hr class="my-4 border-gray-200">

                    <div id="lista_prodotti" class="space-y-4">
                        </div>

                    <button onclick="aggiungiProdotto()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded transition-colors shadow-sm mt-2 border border-gray-300 text-sm">
                        + Aggiungi Prodotto da Confrontare
                    </button>

                    <button onclick="eseguiSimulazione()" class="w-full bg-[#C8102E] hover:bg-red-800 text-white font-bold py-3 px-4 rounded transition-colors shadow-md mt-6 tracking-wide">
                        Avvia Simulazione
                    </button>
                </div>
            </div>

            <div class="col-span-1 xl:col-span-3 flex flex-col gap-10" id="dashboards_container">
                </div>
            
        </div>

        <footer class="mt-8 pt-4 border-t border-gray-200 text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-wide">
                I tassi di rendimento presentati in queste proiezioni sono da intendersi al lordo dell'inflazione.
            </p>
        </footer>
        </div>

    <script>
        let productCounter = 0;

        // Inizializzazione applicazione
        window.onload = () => {
            aggiungiProdotto(); // Aggiunge il primo prodotto di default
            aggiornaCampiTassi();
            eseguiSimulazione();
        };

        function aggiornaCampiTassi() {
            const tassi = document.getElementById('inputTassi').value;
            if (tassi === 'f') document.getElementById('config_TassiFissi').classList.remove('hidden');
            else document.getElementById('config_TassiFissi').classList.add('hidden');
        }

        // Crea dinamicamente un form per un nuovo prodotto
        function aggiungiProdotto() {
            productCounter++;
            const id = productCounter;
            
            const bgClass = 'bg-gray-50';

            const html = `
            <div id="box_prodotto_${id}" class="p-4 ${bgClass} border border-gray-200 rounded-lg shadow-sm relative transition-all">
                ${id > 1 ? `<button onclick="rimuoviProdotto(${id})" class="absolute top-3 right-3 text-red-500 hover:text-red-700 font-bold text-xs uppercase tracking-wider">X Rimuovi</button>` : ''}
                
                <label class="block text-sm font-bold mb-2 text-[#C8102E]">Prodotto ${id}</label>
                <select id="inputProdotto_${id}" onchange="aggiornaCampiProdotto(${id})" class="w-full rounded-md border-gray-300 shadow-sm p-2 border focus:border-[#C8102E] mb-3 bg-white">
                    <option value="GenerAzione">GenerAzione Investimento</option>
                    <option value="Rinnova Valore Bonus">Rinnova Valore Bonus</option>
                    <option value="GeneraSviluppo">GeneraSviluppo Sostenibile</option>
                    <option value="Valore Futuro">Valore Futuro</option>
                </select>

                <div id="config_GenerAzione_${id}" class="space-y-2 text-sm">
                    <label class="block font-medium text-gray-700">Percorso:</label>
                    <select id="ga_percorso_${id}" class="w-full p-1 border rounded bg-white">
                        <option value="1">Start (min 30 % GS)</option>
                        <option value="2">Advanced (min 20 % GS)</option>
                        <option value="3">Extra (min 10 % GS)</option>
                    </select>
                    <label class="flex items-center text-gray-700"><input type="checkbox" id="ga_bonus_${id}" class="mr-2 rounded text-[#C8102E] focus:ring-[#C8102E]"> Versione Bonus</label>
                    <label class="block font-medium text-gray-700">% Gesav:</label><input type="number" id="ga_gesav_${id}" value="40" class="w-full p-1 border rounded bg-white">
                    <label class="block font-medium text-gray-700">% Fondi:</label><input type="number" id="ga_fi_${id}" value="40" class="w-full p-1 border rounded bg-white">
                    <label class="block font-medium text-gray-700">% OICR:</label><input type="number" id="ga_oicr_${id}" value="20" class="w-full p-1 border rounded bg-white">
                    <label class="flex items-center text-gray-700"><input type="checkbox" id="ga_strategia_${id}" checked class="mr-2 rounded text-[#C8102E] focus:ring-[#C8102E]"> Usa Strategia Mercati</label>
                </div>

                <div id="config_Rinnova_${id}" class="space-y-2 text-sm hidden">
                    <label class="block font-medium text-gray-700">Opzione:</label>
                    <select id="rv_opzione_${id}" class="w-full p-1 border rounded bg-white"><option value="1">60% RF / 40% GESAV</option><option value="2">100% RF</option><option value="3">100% GEVAL $</option></select>
                    <label class="flex items-center text-gray-700"><input type="checkbox" id="rv_promo_${id}" checked class="mr-2 rounded text-[#C8102E] focus:ring-[#C8102E]"> Promo 0.70%</label>
                    <label class="block font-medium text-gray-700">Cambio EUR/USD:</label><input type="number" id="rv_cambio_${id}" step="0.01" value="1.08" class="w-full p-1 border rounded bg-white">
                </div>

                <div id="config_Sviluppo_${id}" class="space-y-2 text-sm hidden">
                    <label class="flex items-center text-gray-700"><input type="checkbox" id="gs_piu_${id}" class="mr-2 rounded text-[#C8102E] focus:ring-[#C8102E]"> Cliente Più Generali</label>
                    <label class="flex items-center text-gray-700"><input type="checkbox" id="gs_bilancia_${id}" checked class="mr-2 rounded text-[#C8102E] focus:ring-[#C8102E]"> Attiva Bilancia</label>
                </div>

                <div id="config_Valore_${id}" class="space-y-2 text-sm hidden">
                    <label class="flex items-center text-gray-700"><input type="checkbox" id="vf_piu_${id}" class="mr-2 rounded text-[#C8102E] focus:ring-[#C8102E]"> Cliente Più Generali</label>
                    <label class="block font-medium text-gray-700">Traguardo (Anni):</label><input type="number" id="vf_traguardo_${id}" min="15" max="20" value="15" class="w-full p-1 border rounded bg-white">
                    <label class="block font-medium text-gray-700">Tasso Obiettivo (%):</label><input type="number" id="vf_tasso_${id}" step="0.1" value="3.0" class="w-full p-1 border rounded bg-white">
                </div>
            </div>
            `;
            document.getElementById('lista_prodotti').insertAdjacentHTML('beforeend', html);
            aggiornaCampiProdotto(id);
        }

        function rimuoviProdotto(id) {
            const el = document.getElementById(`box_prodotto_${id}`);
            if (el) el.remove();
        }

        function aggiornaCampiProdotto(id) {
            const prod = document.getElementById(`inputProdotto_${id}`).value;
            document.getElementById(`config_GenerAzione_${id}`).classList.add('hidden');
            document.getElementById(`config_Rinnova_${id}`).classList.add('hidden');
            document.getElementById(`config_Sviluppo_${id}`).classList.add('hidden');
            document.getElementById(`config_Valore_${id}`).classList.add('hidden');

            if (prod === 'GenerAzione') document.getElementById(`config_GenerAzione_${id}`).classList.remove('hidden');
            if (prod === 'Rinnova Valore Bonus') document.getElementById(`config_Rinnova_${id}`).classList.remove('hidden');
            if (prod === 'GeneraSviluppo') document.getElementById(`config_Sviluppo_${id}`).classList.remove('hidden');
            if (prod === 'Valore Futuro') document.getElementById(`config_Valore_${id}`).classList.remove('hidden');
        }

        // Funzione per generare lo scheletro HTML della dashboard responsive
        function getHTMLDashboard(idx, nomeProdotto) {
            const isFirst = idx === 0;
            const borderStyle = isFirst ? '' : `border-t-4 border-dashed border-gray-300 pt-8 mt-4`;

            return `
            <div id="dashboard_wrap_${idx}" class="flex flex-col gap-4 ${borderStyle} transition-opacity duration-300 opacity-0">
                <h2 class="text-2xl font-bold px-2 text-[#C8102E]">Analisi Prodotto ${idx+1}: ${nomeProdotto}</h2>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start h-auto">
                    <div class="col-span-1 flex flex-col gap-6 h-full">
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-center flex flex-col justify-center min-h-[160px]">
                            <h4 class="text-sm font-bold text-[#C8102E] uppercase tracking-wider mb-2">Rendimento Netto Atteso</h4>
                            <div id="w1_valore_${idx}" class="text-4xl font-bold text-gray-400">--</div>
                            <div id="w1_perc_${idx}" class="text-gray-700 text-md font-semibold mt-2">--</div>
                            <div id="w1_cagr_${idx}" class="text-gray-500 text-sm mt-1">CAGR: --</div>
                        </div>

                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col justify-center flex-grow">
                            <h4 class="text-sm font-bold text-[#C8102E] uppercase tracking-wider mb-6 text-center">Breakdown Valori</h4>
                            <div class="space-y-4 text-sm w-full">
                                <div class="flex justify-between border-b border-gray-100 pb-2"><span class="text-gray-500">Rendimento Lordo Atteso</span><span id="w2_lordo_${idx}" class="font-bold text-gray-800">--</span></div>
                                <div class="flex justify-between border-b border-gray-100 pb-2"><span class="text-gray-500">Costi</span><span id="w2_costi_${idx}" class="font-bold text-[#EE5D50]">--</span></div>
                                <div class="flex justify-between border-b border-gray-100 pb-2"><span class="text-gray-500">Tassazione</span><span id="w2_tasse_${idx}" class="font-bold text-[#7B61FF]">--</span></div>
                                <div class="flex justify-between pt-2"><span class="text-gray-800 font-bold">Rendimento Netto Atteso</span><span id="w2_netto_${idx}" class="font-bold text-gray-800">--</span></div>
                            </div>
                        </div>
                    </div>

                    <div class="col-span-1 lg:col-span-2 flex flex-col gap-6 h-auto w-full overflow-hidden">
                        <div class="bg-white py-3 px-6 rounded-xl shadow-sm border border-gray-200 flex flex-wrap justify-center gap-x-6 gap-y-2">
                            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#2D68FE] mr-2"></span><span class="text-xs font-bold text-gray-600 uppercase">Capitale</span></div>
                            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#05CD99] mr-2"></span><span class="text-xs font-bold text-gray-600 uppercase">Rendimento Atteso</span></div>
                            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#EE5D50] mr-2"></span><span class="text-xs font-bold text-gray-600 uppercase">Costi</span></div>
                            <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#7B61FF] mr-2"></span><span class="text-xs font-bold text-gray-600 uppercase">Tassazione</span></div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col w-full overflow-hidden min-h-[250px]">
                                <h3 class="text-sm font-bold uppercase mb-2 text-center text-[#C8102E]">Scomposizione Annua</h3>
                                <div id="graficoScomposizione_${idx}" class="w-full flex-grow min-h-[200px]"></div>
                            </div>
                            
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col w-full overflow-hidden min-h-[250px]">
                                <h3 class="text-sm font-bold uppercase mb-2 text-center text-[#C8102E]">Confronto Capitali</h3>
                                <div id="graficoConfronto_${idx}" class="w-full flex-grow min-h-[200px]"></div>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col">
                            <h3 id="titoloTabellaTassi_${idx}" class="text-sm font-bold uppercase mb-4 text-center text-[#C8102E]">Riepilogo Tassi Applicati</h3>
                            <div id="contenitoreTabellaTassi_${idx}" class="overflow-x-auto flex flex-col justify-center custom-scrollbar"></div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        async function eseguiSimulazione() {
            // Raccogli Parametri Base
            const payload = {
                capitale: document.getElementById('inputCapitale').value,
                anni: document.getElementById('inputAnni').value,
                tassi: document.getElementById('inputTassi').value,
                uscita: document.getElementById('inputUscita').value,
                tassi_gs: document.getElementById('tassi_gs').value,
                tassi_fi: document.getElementById('tassi_fi').value,
                tassi_oicr: document.getElementById('tassi_oicr').value,
                tassi_inf: document.getElementById('tassi_inf').value,
                prodotti: []
            };

            // Raccogli dinamicamente tutti i prodotti presenti in pagina
            for(let i = 1; i <= productCounter; i++) {
                const box = document.getElementById(`box_prodotto_${i}`);
                if(!box) continue; // Prodotto rimosso dall'utente
                
                payload.prodotti.push({
                    prodotto: document.getElementById(`inputProdotto_${i}`).value,
                    ga_percorso: document.getElementById(`ga_percorso_${i}`).value,
                    ga_bonus: document.getElementById(`ga_bonus_${i}`).checked,
                    ga_gesav: document.getElementById(`ga_gesav_${i}`).value,
                    ga_fi: document.getElementById(`ga_fi_${i}`).value,
                    ga_oicr: document.getElementById(`ga_oicr_${i}`).value,
                    ga_strategia: document.getElementById(`ga_strategia_${i}`).checked,
                    rv_opzione: document.getElementById(`rv_opzione_${i}`).value,
                    rv_promo: document.getElementById(`rv_promo_${i}`).checked,
                    rv_cambio: document.getElementById(`rv_cambio_${i}`).value,
                    gs_piu: document.getElementById(`gs_piu_${i}`).checked,
                    gs_bilancia: document.getElementById(`gs_bilancia_${i}`).checked,
                    vf_piu: document.getElementById(`vf_piu_${i}`).checked,
                    vf_traguardo: document.getElementById(`vf_traguardo_${i}`).value,
                    vf_tasso: document.getElementById(`vf_tasso_${i}`).value
                });
            }

            try {
                const response = await fetch('/api/simula', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if(data.error) { alert("Errore dal server: " + data.error); return; }
                
                // Pulisci l'area principale e genera N dashboards
                const container = document.getElementById('dashboards_container');
                container.innerHTML = ''; 

                const anni = document.getElementById('inputAnni').value;
                
                data.risultati.forEach((res, index) => {
                    // Crea l'HTML e lo inietta
                    container.insertAdjacentHTML('beforeend', getHTMLDashboard(index, res.nome));
                    
                    const dashboardEl = document.getElementById(`dashboard_wrap_${index}`);
                    
                    // RITARDO INSERITO QUI: Dà il tempo al browser di calcolare l'ingombro reale prima di disegnare i grafici
                    setTimeout(() => {
                        popolaDashboard(index, res, data.tassi_info, anni);
                        // Rivela la dashboard morbidamente dopo aver disegnato i grafici (migliora l'esperienza visiva)
                        dashboardEl.classList.remove('opacity-0');
                    }, 150);
                });

            } catch (error) {
                console.error("Errore:", error);
                alert("Errore di connessione al server.");
            }
        }

        // Funzione super-robusta per formattare in Euro forzando il punto delle migliaia senza decimali
        function formattaEuro(val) {
            let isNegative = val < 0;
            let numStr = Math.abs(Math.round(val)).toString();
            // Aggiunge il punto per le migliaia (RegEx infallibile su qualsiasi browser)
            let formatted = numStr.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            return (isNegative ? "-" : "") + formatted + " €";
        }

        // Popola i dati per una specifica Dashboard (tramite indice)
        function popolaDashboard(idx, prodData, tassiData, anni) {
            const formTasso = (val) => (val * 100).toFixed(2) + '%';
            
            const c = prodData.confronto;
            const k = prodData.kpi;
            
            // 1. KPI Testuali (Inflazione rimossa da UI, formattaEuro infallibile)
            const n = c.r_netto_v;
            document.getElementById(`w1_valore_${idx}`).innerText = formattaEuro(n);
            document.getElementById(`w1_valore_${idx}`).className = `text-4xl font-bold mt-2 ${n >= 0 ? 'text-[#05CD99]' : 'text-[#EE5D50]'}`;
            document.getElementById(`w1_perc_${idx}`).innerText = `${((n / k.cap_iniziale) * 100).toFixed(2)} % in ${anni} anni`;
            document.getElementById(`w1_cagr_${idx}`).innerText = `CAGR: ${k.cagr_netto.toFixed(2)}% Annuo`;

            document.getElementById(`w2_lordo_${idx}`).innerText = formattaEuro(c.r_lordo_v);
            document.getElementById(`w2_costi_${idx}`).innerText = formattaEuro(-c.costi_tot);
            document.getElementById(`w2_tasse_${idx}`).innerText = formattaEuro(-c.tasse_tot);
            document.getElementById(`w2_netto_${idx}`).innerText = formattaEuro(c.r_netto_v);

            // 2. Grafici Plotly (Responsive + Fissi per Touch + Font Corretto + Tooltip Dinamici e Perfetti)
            const layoutBase = {
                barmode: 'stack', paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
                margin: { t: 10, l: 35, r: 10, b: 30 }, showlegend: false,
                xaxis: { type: 'category', fixedrange: true },  // Disattiva lo zoom su asse X (perfetto per iPad)
                yaxis: { fixedrange: true },                    // Disattiva lo zoom su asse Y
                dragmode: false,                                // Disattiva il trascinamento e box-select
                autosize: true,
                separators: ',.',                               // Formato italiano: virgola decimali, punto migliaia
                hoverlabel: { font: { family: 'inherit' } }     // Eredita il font del sito web (Tailwind Sans)
            };

            const configOpzioni = { displayModeBar: false, responsive: true }; // Nasconde la fastidiosa barra degli strumenti

            // Ricostruiamo la traccia "Netto" sommando Reale + Inflazione in JS per nascondere l'inflazione all'utente
            const yNetto = prodData.grafico.rend_reale.map((r, i) => r + prodData.grafico.inflazione[i]);

            // SCOMPOSIZIONE ANNUA
            const traceRend = { x: prodData.grafico.anni, y: yNetto, name: 'Rendimento Netto Atteso', type: 'bar', marker: { color: '#05CD99' }, hovertemplate: '<b>%{data.name}</b><br>%{y:,.0f} €<extra></extra>' };
            const traceCosti = { x: prodData.grafico.anni, y: prodData.grafico.costi, name: 'Costi', type: 'bar', marker: { color: '#EE5D50' }, hovertemplate: '<b>%{data.name}</b><br>%{y:,.0f} €<extra></extra>' };
            const traceTasse = { x: prodData.grafico.anni, y: prodData.grafico.tasse, name: 'Tassazione', type: 'bar', marker: { color: '#7B61FF' }, hovertemplate: '<b>%{data.name}</b><br>%{y:,.0f} €<extra></extra>' };
            Plotly.newPlot(`graficoScomposizione_${idx}`, [traceRend, traceCosti, traceTasse], layoutBase, configOpzioni);

            // CONFRONTO CAPITALI
            const labelsCap = ['Lordo', 'Netto'];
            const vCap = [c.cap_iniziale, c.cap_iniziale];
            const vRend = [c.r_lordo_v, c.r_netto_v];
            const vCosti = [0, c.costi_tot];
            const vTasse = [0, c.tasse_tot];

            const traceCapC = { x: labelsCap, y: vCap, name: 'Capitale', type: 'bar', marker: { color: '#2D68FE' }, width: 0.5, hovertemplate: '<b>%{data.name}</b><br>%{y:,.0f} €<extra></extra>' };
            // Customdata per mostrare il nome corretto del rendimento in base alla colonna sfiorata
            const traceRendC = { 
                x: labelsCap, 
                y: vRend, 
                name: 'Rendimento', 
                customdata: ['Rendimento Lordo Atteso', 'Rendimento Netto Atteso'],
                type: 'bar', 
                marker: { color: '#05CD99' }, 
                width: 0.5, 
                hovertemplate: '<b>%{customdata}</b><br>%{y:,.0f} €<extra></extra>' 
            };
            const traceCostiC = { x: labelsCap, y: vCosti, name: 'Costi', type: 'bar', marker: { color: '#EE5D50' }, width: 0.5, hovertemplate: '<b>%{data.name}</b><br>%{y:,.0f} €<extra></extra>' };
            const traceTasseC = { x: labelsCap, y: vTasse, name: 'Tassazione', type: 'bar', marker: { color: '#7B61FF' }, width: 0.5, hovertemplate: '<b>%{data.name}</b><br>%{y:,.0f} €<extra></extra>' };
            Plotly.newPlot(`graficoConfronto_${idx}`, [traceCapC, traceRendC, traceCostiC, traceTasseC], layoutBase, configOpzioni);

            // 3. Tabella Tassi
            const contTabella = document.getElementById(`contenitoreTabellaTassi_${idx}`);
            const titTabella = document.getElementById(`titoloTabellaTassi_${idx}`);

            if (tassiData.tipo === 'f') {
                titTabella.innerText = "RIEPILOGO TASSI FISSI APPLICATI";
                const tf = tassiData.dettaglio[0];
                contTabella.innerHTML = `
                    <div class="flex flex-wrap justify-around items-center h-full w-full gap-4">
                        <div class="text-center"><div class="text-sm font-bold text-gray-500 uppercase mb-2">Gesav</div><div class="font-bold text-2xl lg:text-3xl text-gray-800">${formTasso(tf.gs)}</div></div>
                        <div class="text-center"><div class="text-sm font-bold text-gray-500 uppercase mb-2">Fondi</div><div class="font-bold text-2xl lg:text-3xl text-gray-800">${formTasso(tf.fi)}</div></div>
                        <div class="text-center"><div class="text-sm font-bold text-gray-500 uppercase mb-2">OICR</div><div class="font-bold text-2xl lg:text-3xl text-gray-800">${formTasso(tf.oicr)}</div></div>
                    </div>
                `;
            } else {
                titTabella.innerText = "TABELLA RENDIMENTI SIMULATI (SCENARIO CONDIVISO)";
                let rows = '';
                tassiData.dettaglio.forEach(r => {
                    rows += `
                        <tr class="hover:bg-gray-50 text-center transition-colors">
                            <td class="py-2 px-4 font-medium border-b border-gray-100">${r.anno}</td>
                            <td class="py-2 px-4 border-b border-gray-100">${formTasso(r.gs)}</td>
                            <td class="py-2 px-4 border-b border-gray-100">${formTasso(r.fi)}</td>
                            <td class="py-2 px-4 border-b border-gray-100">${formTasso(r.oicr)}</td>
                        </tr>
                    `;
                });
                contTabella.innerHTML = `
                    <div class="max-h-[190px] w-full overflow-y-auto custom-scrollbar rounded-lg border border-gray-200">
                        <table class="w-full text-sm text-left text-gray-600 relative">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 text-center sticky top-0 z-10 shadow-sm">
                                <tr>
                                    <th scope="col" class="py-3 px-4">Anno</th>
                                    <th scope="col" class="py-3 px-4">Gesav</th>
                                    <th scope="col" class="py-3 px-4">Fondi</th>
                                    <th scope="col" class="py-3 px-4">OICR</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                            <tfoot class="bg-gray-100 font-bold text-gray-900 text-center sticky bottom-0 z-10 border-t-2 border-gray-300 shadow-md">
                                <tr>
                                    <td class="py-3 px-4 uppercase text-[#C8102E]">Media CAGR</td>
                                    <td class="py-3 px-4">${formTasso(tassiData.medie.gs)}</td>
                                    <td class="py-3 px-4">${formTasso(tassiData.medie.fi)}</td>
                                    <td class="py-3 px-4">${formTasso(tassiData.medie.oicr)}</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
